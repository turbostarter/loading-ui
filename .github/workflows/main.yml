name: CI

on:
  pull_request:
  merge_group:
  workflow_call:

env:
  FORCE_COLOR: 3
  TURBO_TEAM: ${{ secrets.TURBO_TEAM }}
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/setup

      - run: bun run build

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/setup

      - run: bun run lint

      - name: Run React Doctor advisory scan
        if: github.event_name == 'pull_request'
        continue-on-error: true
        run: bun run react-doctor -- --diff origin/${{ github.base_ref }} --annotations

  format:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: ./.github/setup

      - run: bun run format
